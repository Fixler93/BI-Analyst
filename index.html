<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Analyst - Mission Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="landing-page" class="page active">
        <h1>BI Analyst - Mission Dashboard</h1>
        <div class="form-group">
            <label for="playerName">שם השחקן:</label>
            <input type="text" id="playerName" placeholder="הכנס את שמך">
        </div>
        <button onclick="startMission()">התחל משימה</button>
    </div>

    <div id="mission-page" class="page">
        <h1>Mission 1: מצא את החומר בחוסר</h1>
        <p id="playerGreeting"></p>
        <div class="tables-selector">
            <button onclick="openTable('inventory')">📦 Inventory</button>
            <button onclick="openTable('orders')">📋 Orders</button>
            <button onclick="openTable('suppliers')">🏭 Suppliers</button>
            <button onclick="openTable('materials')">📂 Materials</button>
        </div>
        <div id="table-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
